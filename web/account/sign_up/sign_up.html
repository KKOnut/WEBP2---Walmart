<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Walmart</title>
    <link rel="shortcut icon" href="/web/Images/favicon-16x16.webp" type="image/x-icon">
    <link rel="stylesheet" href="/web/account/sign_up/styles_sign_up.css">
</head>
<body>
    <header>
        <img src="../../Images/walmart-logo.webp" alt="" class="icon">
        <br>
        <label for="">Create your Walmart Account</label>
    </header>

    <main class="signup-card">
        <form action="" class="form-container">
            <div class="input-group">
                <label for="lbl_email">Email</label>
                <input type="text" id="email">
            </div>
            <div class = "input-group">
                <label for="first_name">First Name</label> 
                <input type="text" id="first_name">
            </div>

            <div class="input-group">
                <label for="last_name">Last Name</label>
                <input type="text" id="last_name">
            </div>
            
            <div class="input-group">
                <label for="lbl_password">Create a Password*</label>
                <input type="text" id="password">
            </div>

            <div class = action-button>
                <a onclick="" href="#">Create Account</a>
                <br><br><br>
                <a href="/index.html">Home</a>
                <a href="/web/account/sign_in/sign_in.html">Sign In</a>
            </div>
        </form>
    </main>
    <footer class="info-space-area">
        <div class = info-line-1>
            <p>© 2026 Walmart. All Rights Reserved.</p>
            <p>Give feedback</p>
            <p>Term of Use</p>
            <p>Privacy Notice</p>
            <p>California Supply Chain Act</p>
            <p>Your Privacy Chocice</p>
            <p>Notice at Collection</p>
            <p>Opt Out Request Honored</p>
        </div>
    </footer>
    
</body>
</html>
