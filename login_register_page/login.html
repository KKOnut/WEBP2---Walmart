<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Walmart</title>
    <link rel="shortcut icon" href="../Images/favicon-16x16.webp" type="image/x-icon">
    <link rel="stylesheet" href="styles_login.css">
</head>
<body>
    <img src="../Images/walmart-logo.webp" alt="" class="icon">
    <label for="">Create your Walmart Account</label>
    <main class="signup-card">
        <form action="" class="form-container">
            <div class="input-group">
                <label for="lbl_email">Email</label>
                <input type="text">
            </div>
            <div class = "input-group">
                <label for="first_name">First Name</label> 
                <input type="text">
            </div>

            <div class="input-group">
                <label for="last_name">Last Name</label>
                <input type="text">
            </div>
            
            <div class="input-group">
                <label for="lbl_phone_number">Phone Number</label>
                <input type="text">
            </div>

            

            <div class="input-group">
                <label for="lbl_password">New Password</label>
                <input type="text">
            </div>

            <div>
                <button>Create Account</button>
                <a href="../index.html">Back</a>
            </div>
            
        </form>
    </main>




    <footer>
        <div class="footer-space-area">
            <div class="info-space">
                <p>Test here</p>
            </div>
        </div>

    </footer>

</body>
</html>
